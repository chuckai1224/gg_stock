<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - GG Stock</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- ApexCharts JS with CDN Fallbacks -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script>
        if (typeof ApexCharts === 'undefined') {
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.45.1/apexcharts.min.js"><\/script>');
        }
    </script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(22, 28, 45, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --success: #ef4444; /* Rise is Red in Taiwan */
            --danger: #10b981;  /* Fall is Green in Taiwan */
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 242, 254, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 172, 254, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .btn-filter {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-filter:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--warning);
        }

        .btn-filter.active {
            background: linear-gradient(135deg, rgba(245,158,11,0.25), rgba(239,68,68,0.25));
            border-color: var(--warning);
            color: var(--warning);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.3);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            padding-left: 2.2rem;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            width: 250px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            width: 320px;
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Table Card */
        .table-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            overflow: hidden;
        }

        .table-container {
            overflow-x: auto;
            max-height: 70vh;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Customize pandas generated table style */
        table.dataframe {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.875rem;
        }

        table.dataframe th, table.dataframe td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        table.dataframe th {
            background-color: rgba(15, 23, 42, 0.8);
            color: var(--primary);
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            user-select: none;
        }

        table.dataframe th:hover {
            color: #fff;
        }

        table.dataframe tr {
            transition: all 0.2s;
        }

        table.dataframe tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
            box-shadow: inset 4px 0 0 var(--primary);
        }

        /* Hide column helper class */
        .hidden-col {
            display: none !important;
        }

        /* Interactive columns indicators */
        .sort-asc::after { content: " ↑"; font-size: 0.75rem; }
        .sort-desc::after { content: " ↓"; font-size: 0.75rem; }

        /* Action buttons in table */
        .btn-chart {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            color: #0b0f19;
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s;
        }

        .btn-chart:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        /* Modal popup overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 1300px;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 0.75rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #fff;
        }

        /* Modal Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            color: var(--primary);
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.15);
        }

        .tab-content {
            display: none;
            min-height: 420px;
            position: relative;
        }

        .tab-content.active {
            display: block;
        }

        /* Chart control row */
        .chart-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }

        .toggle-group {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 2px;
            border-radius: 6px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #0b0f19;
        }

        /* Apexcharts custom container styles */
        .chart-container {
            width: 100%;
        }

        .no-data-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive design for mobile screens */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }

            .container {
                gap: 0.75rem;
            }

            /* Header stacking */
            header {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem;
                gap: 1rem;
            }

            header > div:first-child {
                justify-content: space-between;
                width: 100%;
            }

            h1 {
                font-size: 1.3rem;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
                gap: 0.75rem;
            }

            .btn-filter {
                justify-content: center;
                width: 100%;
            }

            .search-box {
                width: 100%;
            }

            .search-box input {
                width: 100% !important;
            }

            /* Table compression */
            .table-card {
                padding: 0.75rem;
                border-radius: 12px;
            }

            .table-container {
                max-height: 80vh;
            }

            table.dataframe th, table.dataframe td {
                padding: 0.5rem 0.6rem;
                font-size: 0.75rem;
            }

            /* Modal optimization */
            .modal-content {
                width: 96%;
                padding: 1rem;
                max-height: 95vh;
                overflow-y: auto;
            }

            .modal-title {
                font-size: 1.1rem;
            }

            .tabs {
                gap: 0.25rem;
            }

            .tab-btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.8rem;
            }

            .tab-content {
                min-height: auto;
            }

            /* Class to hide columns on mobile dynamically */
            .phone-hide {
                display: none !important;
            }
        }

        /* Grid layout for displaying all stock charts simultaneously */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            max-height: 75vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="/online/" class="btn-back">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <span>回主控制台</span>
                </a>
                <h1>{{ title }}</h1>
            </div>
            <div class="actions">
                <button class="btn-filter" id="btn-chip-filter" onclick="toggleChipFilter()" title="保留：籌碼面6項成立≥4項 且 基本面總分≥0">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    籌碼+基本面篩選
                </button>
                <div class="search-box">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="table-search" placeholder="搜尋代號或名稱...">
                </div>
            </div>
        </header>

        <!-- Report Table -->
        <div class="table-card">
            <div class="table-container">
                {{ table_html|safe }}
            </div>
        </div>
    </div>

    <!-- Chart detail Modal -->
    <div class="modal-overlay" id="detail-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    <span id="modal-stock-title">個股技術圖表</span>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>

            <!-- Charts Grid (War Room Style Layout) -->
            <div class="charts-grid">
                <!-- 1. Daily K-line container -->
                <div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); padding: 1rem; border-radius: 12px;">
                    <h3 style="font-size: 0.9rem; color: var(--primary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span>日 K 線圖與成交量</span>
                    </h3>
                    <div class="chart-container">
                        <div id="chart-kline-candlestick"></div>
                        <div id="chart-kline-volume" style="margin-top: -10px;"></div>
                    </div>
                </div>

                <!-- 2. Weekly K-line container -->
                <div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); padding: 1rem; border-radius: 12px;">
                    <h3 style="font-size: 0.9rem; color: var(--secondary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span>週 K 線圖與成交量</span>
                    </h3>
                    <div class="chart-container">
                        <div id="chart-kline-candlestick-week"></div>
                        <div id="chart-kline-volume-week" style="margin-top: -10px;"></div>
                    </div>
                </div>

                <!-- 3. Shareholders Trend container -->
                <div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); padding: 1rem; border-radius: 12px;">
                    <h3 style="font-size: 0.9rem; color: var(--primary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        <span>歷周大戶與散戶持股比 (%)</span>
                    </h3>
                    <div class="chart-container">
                        <div id="chart-shareholder-trend"></div>
                    </div>
                </div>

                <!-- 4. Institutional Flows container -->
                <div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); padding: 1rem; border-radius: 12px;">
                    <h3 style="font-size: 0.9rem; color: var(--secondary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
                        <span>歷日三大法人買賣超 (張)</span>
                    </h3>
                    <div class="chart-container">
                        <div id="chart-institutional-flows"></div>
                    </div>
                </div>

                <!-- 5. Margins Chart container -->
                <div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); padding: 1rem; border-radius: 12px;">
                    <h3 style="font-size: 0.9rem; color: var(--primary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        <span>歷季三率走勢 (%)</span>
                    </h3>
                    <div class="chart-container">
                        <div id="chart-financial-margins"></div>
                    </div>
                </div>

                <!-- 6. Revenue container -->
                <div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); padding: 1rem; border-radius: 12px;">
                    <h3 style="font-size: 0.9rem; color: var(--secondary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
                        <span>單季營收 (百萬)</span>
                    </h3>
                    <div class="chart-container">
                        <div id="chart-financial-revenue"></div>
                    </div>
                </div>

                <!-- 7. EPS container -->
                <div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); padding: 1rem; border-radius: 12px;">
                    <h3 style="font-size: 0.9rem; color: var(--primary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
                        <span>單季 EPS (元)</span>
                    </h3>
                    <div class="chart-container">
                        <div id="chart-financial-eps"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Track rendered charts to prevent duplicates / memory leaks
        let activeCharts = {
            klineDayKline: null,
            klineDayVolume: null,
            klineWeekKline: null,
            klineWeekVolume: null,
            shareholder: null,
            institutional: null,
            financialMargins: null,
            financialRevenue: null,
            financialEps: null
        };
        
        let currentStockData = null;

        // Columns definition map
        let colMap = {};

        // Document ready logic
        document.addEventListener('DOMContentLoaded', () => {
            const table = document.querySelector('table.dataframe');
            if (!table) return;

            // 1. Map columns and find index of K-line / chips data
            const headers = table.querySelectorAll('thead th');
            headers.forEach((th, idx) => {
                const name = th.textContent.trim();
                colMap[name] = idx;
            });

            // 2. Identify columns to hide
            const columnsToHide = [
                'day kline open', 'day kline high', 'day kline low', 'day kline close', 'day kline date', 'day kline vol',
                'week kline open', 'week kline high', 'week kline low', 'week kline close', 'week kline date', 'week kline vol',
                '股權日期', '大戶持股', '散戶持股',
                'big3 date', '外資', '投信', '自營商', 'market',
                '歷季季度'
            ];

            const hideIndices = columnsToHide.map(name => colMap[name]).filter(idx => idx !== undefined);

            // 2.5 Identify columns to hide on mobile screens to save space
            const phoneHideColumns = [

        // Chip filter state
        let chipFilterActive = false;

        // Get numeric value from a formatted cell (handles %, commas, span wrappers)
        function getCellNumVal(row, colName) {
            const idx = colMap[colName];
            if (idx === undefined) return NaN;
            const cell = row.cells[idx + 1];
            if (!cell) return NaN;
            return parseFloat(cell.textContent.trim().replace(/%|,/g, ''));
        }

        // Count how many of the 6 chip conditions are met for a row
        function getChipScore(row) {
            let score = 0;
            if (getCellNumVal(row, '董監持股增減') > 0) score++;
            if (getCellNumVal(row, '投信增減') > 0) score++;
            if (getCellNumVal(row, '外資增減') > 0) score++;
            if (getCellNumVal(row, '大戶近一月增加比') > 0) score++;
            if (getCellNumVal(row, '大戶近一周增加比') > 0) score++;
            if (getCellNumVal(row, '散戶近一月增加比') < 0) score++;
            return score;
        }

        // Apply all active filters (search + chip filter)
        function applyAllFilters() {
            const query = document.getElementById('table-search').value.toLowerCase().trim();
            const rows = document.querySelectorAll('table.dataframe tbody tr');
            rows.forEach(row => {
                const stockId = row.cells[1] ? row.cells[1].textContent.toLowerCase() : '';
                const stockName = row.cells[2] ? row.cells[2].textContent.toLowerCase() : '';
                const matchesSearch = !query || stockId.includes(query) || stockName.includes(query);

                let passesChip = true;
                if (chipFilterActive) {
                    const chipScore = getChipScore(row);
                    const fundScore = getCellNumVal(row, '總分');
                    passesChip = chipScore >= 4 && fundScore >= 0;
                }

                row.style.display = (matchesSearch && passesChip) ? '' : 'none';
            });
        }

        // Table Sorting feature
        function initSorting(table) {
            const headers = table.querySelectorAll('thead th');
            headers.forEach((header, index) => {
                // Skip the "操作" column
                if (index === 0) return;
                header.style.cursor = 'pointer';
                header.addEventListener('click', () => {
                    const currentOrder = header.dataset.order || 'none';
                    const newOrder = currentOrder === 'asc' ? 'desc' : 'asc';
                    
                    sortTable(table, index, newOrder);
                    
                    // Reset labels
                    headers.forEach(h => {
                        h.dataset.order = 'none';
                        h.classList.remove('sort-asc', 'sort-desc');
                    });
                    
                    header.dataset.order = newOrder;
                    header.classList.add(newOrder === 'asc' ? 'sort-asc' : 'sort-desc');
                });
            });
        }

        function sortTable(table, colIndex, order) {
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            rows.sort((a, b) => {
                const valA = a.cells[colIndex].textContent.trim();
                const valB = b.cells[colIndex].textContent.trim();
                
                // Parse numbers (handling percent, commas, etc)
                const cleanA = valA.replace(/%|,/g, '');
                const cleanB = valB.replace(/%|,/g, '');
                const numA = parseFloat(cleanA);
                const numB = parseFloat(cleanB);
                
                if (!isNaN(numA) && !isNaN(numB)) {
                    return order === 'asc' ? numA - numB : numB - numA;
                }
                
                // fallback to string comparison
                return order === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            
            rows.forEach(row => tbody.appendChild(row));
        }

        // Parse utility functions
        function parseCsvList(str) {
            if (!str || str.trim() === '' || str.trim() === 'NaN' || str.trim() === 'None' || str.trim() === 'null') return [];
            return str.split(',').map(v => v.trim());
        }

        function parseCsvFloatList(str) {
            return parseCsvList(str).map(v => {
                const f = parseFloat(v);
                return isNaN(f) ? null : f;
            });
        }

        function parseDate(dateStr) {
            if (!dateStr) return 0;
            const parts = dateStr.trim().split('-');
            if (parts.length === 3) {
                let y = parseInt(parts[0]);
                const m = parseInt(parts[1]) - 1;
                const d = parseInt(parts[2]);
                // Convert yy-mm-dd to 20yy-mm-dd
                const year = y < 100 ? 2000 + y : y;
                return new Date(year, m, d).getTime();
            }
            return new Date(dateStr).getTime();
        }

        // Helper to render a K-line + Volume Chart Group
        function renderChartGroup(dates, opens, highs, lows, closes, vols, candlestickElId, volumeElId, groupName, activeChartKeyPrefix) {
            const targetElKline = document.getElementById(candlestickElId);
            const targetElVol = document.getElementById(volumeElId);

            if (!dates || dates.length === 0 || !opens || opens.length === 0) {
                targetElKline.innerHTML = `
                    <div class="no-data-msg" style="position: relative; top: 0; left: 0; transform: none; padding: 2rem;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        <span>無足夠的 K 線數據可供繪製。</span>
                    </div>`;
                targetElVol.innerHTML = '';
                return;
            }

            targetElKline.innerHTML = '';
            targetElVol.innerHTML = '';

            const ohlcData = [];
            const volData = [];

            for (let i = 0; i < dates.length; i++) {
                const ts = parseDate(dates[i]);
                if (opens[i] !== null && highs[i] !== null && lows[i] !== null && closes[i] !== null) {
                    ohlcData.push({
                        x: ts,
                        y: [opens[i], highs[i], lows[i], closes[i]]
                    });
                }
                if (vols[i] !== null) {
                    const isUp = closes[i] >= opens[i];
                    volData.push({
                        x: ts,
                        y: Math.round(vols[i]),
                        fillColor: isUp ? 'rgba(239, 68, 68, 0.7)' : 'rgba(16, 185, 129, 0.7)'
                    });
                }
            }

            const isMobile = window.innerWidth <= 768;
            const klineHeight = isMobile ? 160 : 220;
            const volumeHeight = isMobile ? 70 : 100;

            const klineOptions = {
                series: [{
                    name: 'K線',
                    data: ohlcData
                }],
                chart: {
                    type: 'candlestick',
                    height: klineHeight,
                    id: candlestickElId,
                    group: groupName,
                    zoom: { enabled: false },
                    toolbar: { show: false },
                    animations: { enabled: false }
                },
                plotOptions: {
                    candlestick: {
                        colors: {
                            upward: '#ef4444',
                            downward: '#10b981'
                        },
                        wick: { useFillColor: true }
                    }
                },
                xaxis: {
                    type: 'datetime',
                    labels: { show: false, style: { colors: '#9ca3af' } },
                    axisBorder: { show: false },
                    axisTicks: { show: false }
                },
                yaxis: {
                    tooltip: { enabled: true },
                    labels: {
                        style: { colors: '#9ca3af' },
                        formatter: val => val.toFixed(1)
                    }
                },
                grid: { borderColor: 'rgba(255,255,255,0.06)' },
                tooltip: { shared: true, intersect: false, theme: 'dark' }
            };

            const volOptions = {
                series: [{
                    name: '成交量',
                    data: volData
                }],
                chart: {
                    type: 'bar',
                    height: volumeHeight,
                    id: volumeElId,
                    group: groupName,
                    zoom: { enabled: false },
                    toolbar: { show: false },
                    animations: { enabled: false }
                },
                dataLabels: {
                    enabled: false
                },
                xaxis: {
                    type: 'datetime',
                    labels: { style: { colors: '#9ca3af' } }
                },
                yaxis: {
                    labels: {
                        style: { colors: '#9ca3af' },
                        formatter: val => val >= 1000 ? (val / 1000).toFixed(0) + 'K' : val
                    }
                },
                grid: { borderColor: 'rgba(255,255,255,0.06)' },
                tooltip: { shared: true, intersect: false, theme: 'dark' }
            };

            if (typeof ApexCharts === 'undefined') {
                targetElKline.innerHTML = '<div style="color: var(--warning); padding: 1rem;">❌ 無法載入圖表套件，請檢查網路連線。</div>';
                return;
            }

            const klineChart = new ApexCharts(targetElKline, klineOptions);
            const volChart = new ApexCharts(targetElVol, volOptions);

            klineChart.render();
            volChart.render();

            activeCharts[activeChartKeyPrefix + 'Kline'] = klineChart;
            activeCharts[activeChartKeyPrefix + 'Volume'] = volChart;
        }

        // RENDER: Daily and Weekly K-Line & Volume Charts Simultaneously
        function renderKCharts() {
            // Clean up previous charts
            if (activeCharts.klineDayKline) activeCharts.klineDayKline.destroy();
            if (activeCharts.klineDayVolume) activeCharts.klineDayVolume.destroy();
            if (activeCharts.klineWeekKline) activeCharts.klineWeekKline.destroy();
            if (activeCharts.klineWeekVolume) activeCharts.klineWeekVolume.destroy();
            
            activeCharts.klineDayKline = null;
            activeCharts.klineDayVolume = null;
            activeCharts.klineWeekKline = null;
            activeCharts.klineWeekVolume = null;

            // Render Day Group
            renderChartGroup(
                currentStockData.dayDates,
                currentStockData.dayOpen,
                currentStockData.dayHigh,
                currentStockData.dayLow,
                currentStockData.dayClose,
                currentStockData.dayVol,
                'chart-kline-candlestick',
                'chart-kline-volume',
                'day-group',
                'klineDay'
            );

            // Render Week Group
            renderChartGroup(
                currentStockData.weekDates,
                currentStockData.weekOpen,
                currentStockData.weekHigh,
                currentStockData.weekLow,
                currentStockData.weekClose,
                currentStockData.weekVol,
                'chart-kline-candlestick-week',
                'chart-kline-volume-week',
                'week-group',
                'klineWeek'
            );
        }

        // RENDER: Shareholder distribution Line Chart
        function renderChipCharts() {
            if (activeCharts.shareholder) activeCharts.shareholder.destroy();
            activeCharts.shareholder = null;

            const targetEl = document.getElementById('chart-shareholder-trend');
            const dates = currentStockData.chipDates;
            const bigs = currentStockData.bigHolders;
            const smalls = currentStockData.smallHolders;

            if (!dates || dates.length === 0 || !bigs || bigs.length === 0) {
                targetEl.innerHTML = `
                    <div class="no-data-msg">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        <span>無股權分散 (集保籌碼) 數據。</span>
                    </div>`;
                return;
            }

            targetEl.innerHTML = '';

            const bigSeries = [];
            const smallSeries = [];

            // TDCC data is weekly. Order in python is usually latest to oldest, so let's reverse it to show chronologically
            const revDates = [...dates].reverse();
            const revBigs = [...bigs].reverse();
            const revSmalls = [...smalls].reverse();

            for (let i = 0; i < revDates.length; i++) {
                const ts = parseDate(revDates[i]);
                if (revBigs[i] !== null) {
                    bigSeries.push({ x: ts, y: revBigs[i] });
                }
                if (revSmalls[i] !== null) {
                    smallSeries.push({ x: ts, y: revSmalls[i] });
                }
            }

            const isMobile = window.innerWidth <= 768;
            const chartHeight = isMobile ? 260 : 380;

            const options = {
                series: [
                    { name: '大戶持股比例 (>1000張)', data: bigSeries },
                    { name: '散戶持股比例 (<400張)', data: smallSeries }
                ],
                chart: {
                    type: 'line',
                    height: chartHeight,
                    zoom: { enabled: false },
                    toolbar: { show: false },
                    animations: { enabled: true }
                },
                colors: ['#ef4444', '#3b82f6'], // Red & Blue
                stroke: { width: 3, curve: 'smooth' },
                xaxis: {
                    type: 'datetime',
                    labels: { style: { colors: '#9ca3af' } }
                },
                yaxis: {
                    title: { text: '持股百分比 (%)', style: { color: '#f3f4f6' } },
                    labels: {
                        style: { colors: '#9ca3af' },
                        formatter: val => val.toFixed(2) + '%'
                    }
                },
                grid: { borderColor: 'rgba(255,255,255,0.06)' },
                tooltip: { theme: 'dark' }
            };

            activeCharts.shareholder = new ApexCharts(targetEl, options);
            activeCharts.shareholder.render();
        }

        // RENDER: Institutional flows Column Chart
        function renderInstCharts() {
            if (activeCharts.institutional) activeCharts.institutional.destroy();
            activeCharts.institutional = null;

            const targetEl = document.getElementById('chart-institutional-flows');
            const dates = currentStockData.instDates;
            const foreign = currentStockData.foreign;
            const it = currentStockData.it;
            const prop = currentStockData.prop;

            if (!dates || dates.length === 0) {
                targetEl.innerHTML = `
                    <div class="no-data-msg">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
                        <span>無三大法人買賣超數據。</span>
                    </div>`;
                return;
            }

            targetEl.innerHTML = '';

            // Reverse to show chronologically
            const revDates = [...dates].reverse();
            const revForeign = [...foreign].reverse();
            const revIT = [...it].reverse();
            const revProp = [...prop].reverse();

            const foreignSeries = [];
            const itSeries = [];
            const propSeries = [];

            for (let i = 0; i < revDates.length; i++) {
                const ts = parseDate(revDates[i]);
                foreignSeries.push({ x: ts, y: revForeign[i] !== null ? Math.round(revForeign[i]) : 0 });
                itSeries.push({ x: ts, y: revIT[i] !== null ? Math.round(revIT[i]) : 0 });
                propSeries.push({ x: ts, y: revProp[i] !== null ? Math.round(revProp[i]) : 0 });
            }

            const isMobile = window.innerWidth <= 768;
            const chartHeight = isMobile ? 260 : 380;

            const options = {
                series: [
                    { name: '外資 (張)', data: foreignSeries },
                    { name: '投信 (張)', data: itSeries },
                    { name: '自營商 (張)', data: propSeries }
                ],
                chart: {
                    type: 'bar',
                    height: chartHeight,
                    zoom: { enabled: false },
                    toolbar: { show: false }
                },
                dataLabels: {
                    enabled: false
                },
                colors: ['#4facfe', '#e11d48', '#f59e0b'], // Blue, Rose/Red, Orange
                plotOptions: {
                    bar: {
                        horizontal: false,
                        columnWidth: '55%',
                        endingShape: 'rounded'
                    }
                },
                xaxis: {
                    type: 'datetime',
                    labels: { style: { colors: '#9ca3af' } }
                },
                yaxis: {
                    title: { text: '買賣超量 (張)', style: { color: '#f3f4f6' } },
                    labels: {
                        style: { colors: '#9ca3af' },
                        formatter: val => (val > 0 ? '+' : '') + Math.round(val).toLocaleString()
                    }
                },
                grid: { borderColor: 'rgba(255,255,255,0.06)' },
                tooltip: { theme: 'dark' }
            };

            activeCharts.institutional = new ApexCharts(targetEl, options);
            activeCharts.institutional.render();
        }

        // RENDER: Fundamental Financial Analysis Charts (Margins & Revenue/EPS Dual Axis)
        function renderFinancialCharts() {
            if (activeCharts.financialMargins) activeCharts.financialMargins.destroy();
            if (activeCharts.financialRevenue) activeCharts.financialRevenue.destroy();
            if (activeCharts.financialEps) activeCharts.financialEps.destroy();
            activeCharts.financialMargins = null;
            activeCharts.financialRevenue = null;
            activeCharts.financialEps = null;

            const marginsEl = document.getElementById('chart-financial-margins');
            const revEl = document.getElementById('chart-financial-revenue');
            const epsEl = document.getElementById('chart-financial-eps');

            const f = currentStockData;
            // Validate that we have the data
            if (!f.financeQuarters || f.financeQuarters.length === 0) {
                marginsEl.innerHTML = `<div class="no-data-msg"><span>無財務基本面數據。</span></div>`;
                revEl.innerHTML = '';
                epsEl.innerHTML = '';
                return;
            }

            marginsEl.innerHTML = '';
            revEl.innerHTML = '';
            epsEl.innerHTML = '';

            const isMobile = window.innerWidth <= 768;
            const chartHeight = isMobile ? 260 : 380;

            // 1. Margins Chart (Gross, Operating, Net margins)
            const marginsOptions = {
                series: [
                    { name: '毛利率', data: f.financeGross },
                    { name: '營利率', data: f.financeOperating },
                    { name: '淨利率', data: f.financeNet }
                ],
                chart: {
                    type: 'bar',
                    height: chartHeight,
                    zoom: { enabled: false },
                    toolbar: { show: false },
                    animations: { enabled: true }
                },
                plotOptions: {
                    bar: {
                        horizontal: false,
                        columnWidth: '55%',
                        dataLabels: {
                            position: 'top',
                        }
                    }
                },
                dataLabels: {
                    enabled: true,
                    formatter: function (val) {
                        return val !== null && !isNaN(val) ? val.toFixed(1) + '%' : '';
                    },
                    offsetY: -20,
                    style: {
                        fontSize: '9px',
                        colors: ['#fff']
                    }
                },
                colors: ['#3b82f6', '#ef4444', '#10b981'], // Blue, Red, Green
                stroke: {
                    show: true,
                    width: 2,
                    colors: ['transparent']
                },
                xaxis: {
                    categories: f.financeQuarters,
                    labels: { style: { colors: '#9ca3af' } }
                },
                yaxis: {
                    title: { text: '百分比 (%)', style: { color: '#f3f4f6' } },
                    labels: {
                        style: { colors: '#9ca3af' },
                        formatter: val => val.toFixed(1) + '%'
                    }
                },
                grid: { borderColor: 'rgba(255,255,255,0.06)' },
                tooltip: {
                    theme: 'dark',
                    y: {
                        formatter: val => val !== null && !isNaN(val) ? val.toFixed(2) + '%' : '-'
                    }
                }
            };

            // 2. Revenue Chart (Pure Bar Chart)
            const revOptions = {
                series: [
                    { name: '單季營收 (百萬)', data: f.financeRevenue }
                ],
                chart: {
                    height: chartHeight,
                    type: 'bar',
                    zoom: { enabled: false },
                    toolbar: { show: false }
                },
                plotOptions: {
                    bar: {
                        columnWidth: '55%',
                        dataLabels: {
                            position: 'top',
                        }
                    }
                },
                dataLabels: {
                    enabled: true,
                    formatter: function (val) {
                        return val !== null && !isNaN(val) ? Math.round(val).toLocaleString() : '';
                    },
                    offsetY: -20,
                    style: {
                        fontSize: '9px',
                        colors: ['#fff']
                    }
                },
                colors: ['#ef4444'], // Red
                xaxis: {
                    categories: f.financeQuarters,
                    labels: { style: { colors: '#9ca3af' } }
                },
                yaxis: {
                    title: {
                        text: "單季營收 (百萬)",
                        style: { color: '#ef4444' }
                    },
                    labels: {
                        style: { colors: '#ef4444' },
                        formatter: val => val !== null && !isNaN(val) ? Math.round(val).toLocaleString() : ''
                    }
                },
                grid: { borderColor: 'rgba(255,255,255,0.06)' },
                tooltip: {
                    theme: 'dark',
                    y: {
                        formatter: val => val !== null && !isNaN(val) ? Math.round(val).toLocaleString() + ' 百萬' : '-'
                    }
                }
            };

            // 3. EPS Chart (Pure Line Chart)
            const epsOptions = {
                series: [
                    { name: '單季 EPS (元)', data: f.financeEps }
                ],
                chart: {
                    height: chartHeight,
                    type: 'line',
                    zoom: { enabled: false },
                    toolbar: { show: false }
                },
                stroke: {
                    width: 3,
                    curve: 'smooth'
                },
                markers: {
                    size: 5,
                    hover: {
                        size: 7
                    }
                },
                dataLabels: {
                    enabled: true,
                    formatter: function (val) {
                        return val !== null && !isNaN(val) ? val.toFixed(2) : '';
                    },
                    offsetY: -10,
                    style: {
                        fontSize: '9px',
                        colors: ['#fff']
                    }
                },
                colors: ['#3b82f6'], // Blue
                xaxis: {
                    categories: f.financeQuarters,
                    labels: { style: { colors: '#9ca3af' } }
                },
                yaxis: {
                    title: {
                        text: "單季 EPS (元)",
                        style: { color: '#3b82f6' }
                    },
                    labels: {
                        style: { colors: '#3b82f6' },
                        formatter: val => val !== null && !isNaN(val) ? val.toFixed(2) : ''
                    }
                },
                grid: { borderColor: 'rgba(255,255,255,0.06)' },
                tooltip: {
                    theme: 'dark',
                    y: {
                        formatter: val => val !== null && !isNaN(val) ? val.toFixed(2) + ' 元' : '-'
                    }
                }
            };

            activeCharts.financialMargins = new ApexCharts(marginsEl, marginsOptions);
            activeCharts.financialRevenue = new ApexCharts(revEl, revOptions);
            activeCharts.financialEps = new ApexCharts(epsEl, epsOptions);

            activeCharts.financialMargins.render();
            activeCharts.financialRevenue.render();
            activeCharts.financialEps.render();
        }
    </script>
</body>
</html>
